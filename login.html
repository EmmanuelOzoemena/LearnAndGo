<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lear'n'go - Log In</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="auth-container">
      <header class="auth-header">
        <h1 class="logo-text">Lear'n'go</h1>
        <p>Welcome back! Let's pick up where you left off.</p>
      </header>

      <form class="auth-form" onsubmit="event.preventDefault()">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="name@example.com"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="btn-auth">Log In</button>
      </form>

      <footer class="auth-footer">
        <p>New to Lear'n'go? <a href="signup.html">Sign Up Here</a></p>
        <p style="margin-top: 15px">
          <a href="index.html" style="color: #718096"
            ><i class="fa-solid fa-arrow-left"></i> Back to Home</a
          >
        </p>
      </footer>
    </div>
  </body>
</html>
